<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Moeda</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <img src="./assets/financial-balance.webp" alt="gif imagem financial-balance" id="gif-logo">
    <main class="container">
        <h1 class="title">Conversor de Moeda</h1>

        <div class="currency-row">
            <div class="currency-box">
                <label for="from-currency">Converter <b>de:</b></label>
                <select id="from-currency" title="Moeda-Corrente">
                    <option selected name="BRL" value="R$" lang="pt-BR">R$ Real Brasileiro</option>
                    <option name="USD" value="$" lang="en-US">$ Dólar Americano</option>
                    <option name="EUR" value="€" lang="es-ES">€ Euro</option>
                    <option name="GBP" value="£" lang="en-GB">£ Libra Esterlina</option>
                    <option name="JPY" value="¥" lang="ja-JP">¥ Iene Japonês</option>
                    <option name="CAD" value="$" lang="en-CA">$ Dólar Canadense</option>
                    <option name="AUD" value="$" lang="en-AU">$ Dólar Australiano</option>
                    <option name="CHF" value="Fr$" lang="fr-CH">Fr$ Franco Suíço</option>
                    <option name="CNY" value="¥" lang="zh-CN">¥ Yuan Chinês</option>
                    <option name="MXN" value="$" lang="es-MX">$ Peso Mexicano</option>
                </select>
            </div>

            <button class="swap-btn" id="swap-btn" title="Trocar Moeda-Corrente e Moeda-Alvo">↑↓</button>

            <div class="currency-box">
                <label for="to-currency">Converter <b>para:</b></label>
                <select id="to-currency" title="Moeda-Alvo">
                    <option name="BRL" value="R$" lang="pt-BR">R$ Real Brasileiro</option>
                    <option selected name="USD" value="$" lang="en-US">$ Dólar Americano</option>
                    <option name="EUR" value="€" lang="es-ES">€ Euro</option>
                    <option name="GBP" value="£" lang="en-GB">£ Libra Esterlina</option>
                    <option name="JPY" value="¥" lang="ja-JP">¥ Iene Japonês</option>
                    <option name="CAD" value="$" lang="en-CA">$ Dólar Canadense</option>
                    <option name="AUD" value="$" lang="en-AU">$ Dólar Australiano</option>
                    <option name="CHF" value="Fr$" lang="fr-CH">Fr$ Franco Suíço</option>
                    <option name="CNY" value="¥" lang="zh-CN">¥ Yuan Chinês</option>
                    <option name="MXN" value="$" lang="es-MX">$ Peso Mexicano</option>
                </select>
            </div>
            <div class="input-box">
                <label for="amount">Valor a <b>converter</b></label>
                <input type="number" id="amount" placeholder="R$ 1.000,00">
            </div>
        </div>

        <button class="convert-btn" id="convert-btn">Converter</button>

        <section class="result-section">
            <div class="result-box">
                <div class="box-current flag">
                    <img src="./assets/flag-BRL.png" alt="Imagem Moeda-Corrente">
                    <p class="from-currency-result">Real</p>
                    <p class="current-rate" id="current-rate">R$ 0.00</p>
                </div>
                <img class="arrow-img" src="./assets/down-arrow.png" alt="Seta para baixo">
                <div class="box-target flag">
                    <img src="./assets/flag-USD.png" alt="Imagem Moeda-Alvo">
                    <p class="to-currency-result" id="to-currency-result">Dólar</p>
                    <p class="target-rate" id="target-rate">$ 0.00</p>
                </div>
            </div>
        </section>
    </main>

    <script src="scripts.js"></script>
</body>

</html>
